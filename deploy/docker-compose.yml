version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: loading-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket
    volumes:
      - ./config:/mosquitto/config
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    networks:
      - nginx-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  nginx-network:
    name: nginx-network
    external: true
