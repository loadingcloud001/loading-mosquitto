name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to droplet
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes $SSH_USER@$SSH_HOST "mkdir -p /opt/mosquitto"

          # Upload docker-compose.yml
          scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes docker-compose.yml $SSH_USER@$SSH_HOST:/opt/mosquitto/

          # Upload .env if it exists
          if [ -f .env ]; then
            scp -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes .env $SSH_USER@$SSH_HOST:/opt/mosquitto/
          fi

          # Deploy - stop old container first, then start new
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd /opt/mosquitto
            docker-compose down 2>/dev/null || true
            docker-compose up -d
            docker-compose ps
          ENDSSH

      - name: Health check
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes $SSH_USER@$SSH_HOST "curl -f http://localhost:9001 || true"

      - name: Verify deployment
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes $SSH_USER@$SSH_HOST "docker ps --filter name=loading-mosquitto"
