name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: loadingcloud001/dev-standards/.github/workflows/deploy-template.yml@main
    with:
      service_name: mosquitto
      service_path: /opt/mosquitto
      health_url: ""
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: root
